<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LazyBrain Wiki</title>
  <link rel="stylesheet" href="styles/wiki.css">
</head>
<body>
  <header id="site-header" role="banner">
    <div class="branding">
      <a href="#/" id="brand-link" aria-label="LazyBrain home">
        <span class="brand-name">LazyBrain</span>
      </a>
    </div>

    <div class="search-wrap" role="search">
      <label for="search-input" class="sr-only">Search the brain</label>
      <input
        type="search"
        id="search-input"
        name="q"
        placeholder="Search the brain..."
        autocomplete="off"
        aria-label="Search notes"
      >
      <button type="button" id="search-btn" aria-label="Run search">Search</button>
    </div>

    <nav class="top-nav" aria-label="Site navigation">
      <a href="#/" id="nav-home">Home</a>
      <a href="#/stats" id="nav-stats">Stats</a>
      <a href="#/timeline" id="nav-timeline">Timeline</a>
      <a href="/graph.html" id="nav-graph">Graph</a>
    </nav>

    <button
      type="button"
      id="sidebar-toggle"
      aria-label="Toggle sidebar"
      aria-expanded="false"
      aria-controls="sidebar"
    >&#9776;</button>
  </header>

  <div id="layout">
    <aside
      id="sidebar"
      role="complementary"
      aria-label="Project navigation"
    >
      <div id="sidebar-inner">
        <h2 id="sidebar-heading">Projects</h2>
        <div id="project-tree" role="tree" aria-label="Project tree">
          <p class="sidebar-loading" aria-live="polite">Loading...</p>
        </div>
      </div>
    </aside>

    <div id="content-wrap">
      <nav id="breadcrumb" aria-label="Breadcrumb">
        <!-- populated by router -->
      </nav>

      <main id="content" role="main" aria-live="polite">
        <p class="loading">Loading&hellip;</p>
      </main>
    </div>

    <aside id="meta" role="complementary" aria-label="Page metadata">
      <!-- TOC + infobox injected per page -->
    </aside>
  </div>

  <footer id="site-footer" role="contentinfo">
    <p>
      LazyBrain &mdash; HTML-first second brain
      &nbsp;<span id="footer-stats" aria-live="polite"></span>
    </p>
  </footer>

  <script type="module">
    import { initApp } from './components/app-shell.js';
    initApp().catch(err => {
      const content = document.getElementById('content');
      if (content) {
        content.innerHTML = `<div class="empty-state">
          <h2>Failed to load</h2>
          <p>${err.message}</p>
        </div>`;
      }
    });
  </script>
</body>
</html>
